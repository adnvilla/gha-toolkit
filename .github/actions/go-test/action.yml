# Composite action for testing Go projects
name: 'Test Go Project'
description: 'Runs tests for a Go project with configurable flags'

inputs:
  test-flags:
    description: 'Additional flags for go test'
    required: false
    default: '-v'
  postgres-dsn:
    description: 'PostgreSQL DSN for tests (optional)'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Test
      shell: bash
      env:
        POSTGRES_DSN: ${{ inputs.postgres-dsn }}
      run: go test ${{ inputs.test-flags }} ./...
