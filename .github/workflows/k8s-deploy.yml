# Reusable workflow to deploy an application to Kubernetes via Helm, using the
# generic chart shipped in this repo (charts/app) unless the caller opts into
# its own chart. Assumes the runner already has a working kubeconfig with the
# requested context configured (see ARCHITECTURE.md > Self-hosted runner prerequisites).
# For more information see: https://docs.github.com/en/actions/using-workflows/reusing-workflows

name: Kubernetes Deploy

on:
  workflow_call:
    inputs:
      toolkit-ref:
        description: >-
          Optional override for the git ref of adnvilla/gha-toolkit to pull charts/app from.
          Defaults to the exact commit this workflow file was called at (via job.workflow_sha),
          so the chart version always matches the workflow version with no input needed. Only
          set this to test a chart from a branch. Ignored when use-local-chart is true.
        required: false
        type: string
        default: ''
      ref:
        description: >-
          Git ref/SHA of the calling repo to check out (for the values file). Defaults to
          whatever the workflow run's own context resolves to, which for workflow_run-triggered
          CD is the default branch HEAD, not the commit that triggered the event — pass
          github.event.workflow_run.head_sha explicitly in that case.
        required: false
        type: string
        default: ''
      use-local-chart:
        description: 'Use a chart from the calling repo instead of charts/app from gha-toolkit'
        required: false
        type: boolean
        default: false
      chart-path:
        description: >-
          Path to the Helm chart (relative to gha-toolkit, or to the calling
          repo when use-local-chart is true)
        required: false
        type: string
        default: 'charts/app'
      release-name:
        description: 'Helm release name'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace (created automatically if missing)'
        required: true
        type: string
      kube-context:
        description: 'kubectl context to deploy to'
        required: true
        type: string
      values-file:
        description: 'Path to the values file in the calling repo (e.g. k8s/values-local.yaml)'
        required: true
        type: string
      image:
        description: 'Full image reference, e.g. registry.example.local:5001/my-app:abc1234'
        required: true
        type: string
      helm-set:
        description: 'Additional --set overrides, one KEY=VALUE per line'
        required: false
        type: string
        default: ''
      wait:
        description: 'Wait for resources to become ready'
        required: false
        type: boolean
        default: true
      atomic:
        description: 'Roll back automatically if the upgrade fails'
        required: false
        type: boolean
        default: true
      timeout:
        description: 'Time to wait for the rollout, e.g. 180s'
        required: false
        type: string
        default: '180s'
      helm-version:
        description: 'Helm version to install if not already present on the runner'
        required: false
        type: string
        default: 'v3.16.2'
      dry-run:
        description: >-
          Render the chart client-side (helm template) instead of deploying.
          No kube-context/cluster access is required in this mode — unlike
          helm upgrade --dry-run=client, helm template never contacts a cluster.
        required: false
        type: boolean
        default: false
      environment:
        description: >-
          GitHub Environment name to bind this deployment to (shows up in the repo's Environments
          tab with deployment history, and enables that environment's protection rules/secrets if
          configured in the calling repo's Settings). Defaults to 'production' so every existing
          caller is automatically treated as a production deploy with no with: block changes
          needed. See ENVIRONMENTS.md for how to add a staging environment.
        required: false
        type: string
        default: 'production'
      environment-url:
        description: 'Optional URL shown next to the environment in the GitHub Actions UI'
        required: false
        type: string
        default: ''
      adopt-existing:
        description: >-
          One-time migration switch: before the Helm upgrade, delete any pre-existing
          Deployment/Service/Ingress named release-name in namespace (e.g. created by a prior
          kubectl-apply-based pipeline) so Helm can recreate them cleanly instead of failing on
          ownership metadata / the Deployment's immutable selector. Recreates a new ClusterIP.
          Use only for the first migration deploy, then set back to false — leaving it true
          recreates Service/Ingress on every deploy. See charts/app/README.md.
        required: false
        type: boolean
        default: false
      runs-on:
        description: 'Runner label to execute the job on'
        required: false
        type: string
        default: 'self-hosted'

jobs:
  deploy:
    runs-on: ${{ inputs.runs-on }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout gha-toolkit chart
        if: ${{ !inputs.use-local-chart }}
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ inputs.toolkit-ref || job.workflow_sha }}
          path: .gha-toolkit-chart

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ inputs.helm-version }}

      - name: Select kube context
        if: ${{ !inputs.dry-run }}
        run: |
          kubectl config use-context "${{ inputs.kube-context }}"
          kubectl cluster-info

      - name: Adopt existing resources
        if: ${{ inputs.adopt-existing && !inputs.dry-run }}
        env:
          RELEASE_NAME: ${{ inputs.release-name }}
          NAMESPACE: ${{ inputs.namespace }}
        run: |
          for kind in deployment service ingress; do
            if kubectl get "$kind" "$RELEASE_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
              echo "Deleting pre-existing ${kind}/${RELEASE_NAME} in ${NAMESPACE} so Helm can recreate it"
              kubectl delete "$kind" "$RELEASE_NAME" -n "$NAMESPACE"
            fi
          done

      - name: Deploy with Helm
        env:
          USE_LOCAL_CHART: ${{ inputs.use-local-chart }}
          CHART_PATH: ${{ inputs.chart-path }}
          RELEASE_NAME: ${{ inputs.release-name }}
          NAMESPACE: ${{ inputs.namespace }}
          VALUES_FILE: ${{ inputs.values-file }}
          IMAGE: ${{ inputs.image }}
          HELM_SET: ${{ inputs.helm-set }}
          WAIT: ${{ inputs.wait }}
          ATOMIC: ${{ inputs.atomic }}
          TIMEOUT: ${{ inputs.timeout }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          if [ "${USE_LOCAL_CHART}" == "true" ]; then
            CHART_DIR="${CHART_PATH}"
          else
            CHART_DIR=".gha-toolkit-chart/${CHART_PATH}"
          fi

          IMAGE_REPO="${IMAGE%:*}"
          IMAGE_TAG="${IMAGE##*:}"

          # Shared flags for both template (dry-run) and upgrade paths.
          # helm-set overrides are appended after the image --set so callers can
          # still override image.repository / image.tag if needed.
          RENDER_ARGS=(
            -n "${NAMESPACE}"
            -f "${VALUES_FILE}"
            --set "image.repository=${IMAGE_REPO}"
            --set "image.tag=${IMAGE_TAG}"
          )

          while IFS= read -r kv; do
            [ -z "$kv" ] && continue
            RENDER_ARGS+=(--set "$kv")
          done <<< "${HELM_SET}"

          if [ "${DRY_RUN}" == "true" ]; then
            # helm template is genuinely offline — no cluster lookup, no
            # accidental use of the runner's current kubeconfig context.
            # (helm upgrade --dry-run=client still contacts the cluster.)
            helm template "${RELEASE_NAME}" "${CHART_DIR}" "${RENDER_ARGS[@]}"
          else
            ARGS=(
              upgrade --install "${RELEASE_NAME}" "${CHART_DIR}"
              "${RENDER_ARGS[@]}"
              --create-namespace
              --timeout "${TIMEOUT}"
            )
            [ "${WAIT}" == "true" ] && ARGS+=(--wait)
            [ "${ATOMIC}" == "true" ] && ARGS+=(--atomic)
            helm "${ARGS[@]}"
          fi
