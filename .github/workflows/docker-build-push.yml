# Reusable workflow to build a Docker image and push it to a registry.
# Supports ghcr.io (auto-login via github.token), any registry with optional
# registry-username/registry-password secrets, or a local insecure registry
# (no login). Callers pushing to ghcr.io need permissions: packages: write.
# For more information see: https://docs.github.com/en/actions/using-workflows/reusing-workflows

name: Docker Build and Push

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to the Dockerfile'
        required: true
        type: string
      ref:
        description: >-
          Git ref/SHA to check out and build. Defaults to whatever the workflow run's own context
          resolves to, which for workflow_run-triggered CD is the default branch HEAD, not the
          commit that triggered the event — pass github.event.workflow_run.head_sha explicitly
          in that case.
        required: false
        type: string
        default: ''
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      image-name:
        description: 'Image name, without registry host or tag (e.g. my-app)'
        required: true
        type: string
      registry-host:
        description: >-
          Registry host (and optional org path), e.g. ghcr.io/org,
          docker.io/org, or registry.example.local:5001
        required: true
        type: string
      extra-tags:
        description: 'Additional tags to apply, one per line (short-sha is always added)'
        required: false
        type: string
        default: 'latest'
      build-args:
        description: 'Build args, one KEY=VALUE per line'
        required: false
        type: string
        default: ''
      verify-insecure-registry:
        description: 'Preflight-check that the Docker daemon can reach an insecure/local registry before building'
        required: false
        type: boolean
        default: false
      push:
        description: >-
          Push the built image(s). Set to false to only validate that the
          image builds (e.g. in CI on a PR).
        required: false
        type: boolean
        default: true
      runs-on:
        description: 'Runner label to execute the job on'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      registry-username:
        description: >-
          Username for docker login (Docker Hub or any non-ghcr registry).
          When set together with registry-password, takes precedence over
          the automatic ghcr.io login.
        required: false
      registry-password:
        description: >-
          Password or token for docker login (e.g. Docker Hub access token,
          or a PAT for a private registry). Required when registry-username
          is set.
        required: false
    outputs:
      image:
        description: 'Full image reference (registry-host/image-name:short-sha)'
        value: ${{ jobs.build.outputs.image }}
      short-sha:
        description: 'The short commit SHA used as the primary tag'
        value: ${{ jobs.build.outputs.short-sha }}

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      image: ${{ steps.tags.outputs.image }}
      short-sha: ${{ steps.tags.outputs.short-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          IMAGE="${{ inputs.registry-host }}/${{ inputs.image-name }}"
          {
            echo "image=${IMAGE}:${SHORT_SHA}"
            echo "short-sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Docker daemon insecure-registries and registry connectivity
        if: ${{ inputs.verify-insecure-registry && inputs.push }}
        run: |
          REGISTRY_HOST="${{ inputs.registry-host }}"
          if ! docker info 2>/dev/null | grep -q "${REGISTRY_HOST}"; then
            echo "::error::${REGISTRY_HOST} is not in Docker daemon insecure-registries."
            exit 1
          fi
          ERR=$(docker pull "${REGISTRY_HOST}/__preflight__:none" 2>&1 || true)
          if echo "$ERR" | grep -qE "connection refused|EOF|no such host|dial"; then
            echo "::error::Docker daemon cannot reach ${REGISTRY_HOST}."
            echo "$ERR"
            exit 1
          fi

      # Login only when pushing. Explicit secrets win; otherwise auto-login to
      # ghcr.io via github.token. Local/insecure registries skip login.
      - name: Log in to container registry
        if: ${{ inputs.push }}
        env:
          REGISTRY_HOST: ${{ inputs.registry-host }}
          REGISTRY_USERNAME: ${{ secrets.registry-username }}
          REGISTRY_PASSWORD: ${{ secrets.registry-password }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          # registry-host may be "ghcr.io/org" — login against the host only.
          LOGIN_SERVER="${REGISTRY_HOST%%/*}"

          if [ -n "${REGISTRY_USERNAME}" ] && [ -n "${REGISTRY_PASSWORD}" ]; then
            echo "${REGISTRY_PASSWORD}" | docker login "${LOGIN_SERVER}" \
              -u "${REGISTRY_USERNAME}" --password-stdin
          elif [ "${LOGIN_SERVER}" = "ghcr.io" ]; then
            echo "${GHCR_TOKEN}" | docker login ghcr.io \
              -u "${GHCR_USER}" --password-stdin
          else
            echo "No registry credentials provided; skipping docker login"
            echo "(OK for local/insecure registries that need no auth)"
          fi

      - name: Build image
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
          REGISTRY_IMAGE: ${{ inputs.registry-host }}/${{ inputs.image-name }}
          SHORT_SHA: ${{ steps.tags.outputs.short-sha }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
          BUILD_ARGS: ${{ inputs.build-args }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          CONTEXT: ${{ inputs.context }}
        run: |
          TAG_ARGS=(-t "${REGISTRY_IMAGE}:${SHORT_SHA}")
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            TAG_ARGS+=(-t "${REGISTRY_IMAGE}:${tag}")
          done <<< "$EXTRA_TAGS"

          BUILD_ARG_ARGS=()
          while IFS= read -r arg; do
            [ -z "$arg" ] && continue
            BUILD_ARG_ARGS+=(--build-arg "$arg")
          done <<< "$BUILD_ARGS"

          docker build -f "$DOCKERFILE" "${TAG_ARGS[@]}" "${BUILD_ARG_ARGS[@]}" "$CONTEXT"

      - name: Push image
        if: ${{ inputs.push }}
        env:
          REGISTRY_IMAGE: ${{ inputs.registry-host }}/${{ inputs.image-name }}
          SHORT_SHA: ${{ steps.tags.outputs.short-sha }}
          EXTRA_TAGS: ${{ inputs.extra-tags }}
        run: |
          docker push "${REGISTRY_IMAGE}:${SHORT_SHA}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker push "${REGISTRY_IMAGE}:${tag}"
          done <<< "$EXTRA_TAGS"
