# Release workflow for gha-toolkit
# Triggers the reusable release.yml when CI passes on master — dogfoods the
# same workflow shipped to consumers instead of duplicating its steps.

name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      dry-run: false
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
