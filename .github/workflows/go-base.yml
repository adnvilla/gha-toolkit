# Reusable workflow for building and testing Go projects (base)
# For libraries and projects that don't require external services
# For more information see: https://docs.github.com/en/actions/using-workflows/reusing-workflows

name: Go Build and Test (Base)

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.24'
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      test-flags:
        description: 'Additional flags for go test'
        required: false
        type: string
        default: '-v'
      build-flags:
        description: 'Additional flags for go build'
        required: false
        type: string
        default: '-v'
      runs-on:
        description: 'Runner label to execute the job on'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ inputs.go-version }}

      - name: Validate Dependencies
        run: |
          go mod tidy
          go mod verify

      - name: Build
        run: go build ${{ inputs.build-flags }} ./...

      - name: Test
        if: ${{ inputs.run-tests }}
        run: go test ${{ inputs.test-flags }} ./...
