# CI workflow for gha-toolkit
# This workflow validates workflow syntax and generates automatic releases

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  validate-workflows:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Validate YAML syntax
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .github/workflows/
          strict: false

  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Lint Markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
          ignore_files: node_modules/

  validate-chart:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint charts/app

      - name: Render chart with sample values
        run: |
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=test \
            --set ingress.enabled=true \
            --set ingress.host=test.local > /dev/null

  validate-doc-pins:
    name: Validate Documentation Version Pins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Confirm every workflows/*.yml@ref pin in the docs exists at that ref
        run: |
          set -euo pipefail
          FAIL=0
          while read -r pin; do
            rest="${pin#adnvilla/gha-toolkit/}"
            path="${rest%@*}"
            ref="${rest##*@}"
            if git show "${ref}:${path}" > /dev/null 2>&1; then
              echo "OK   ${path}@${ref}"
            else
              echo "::error::${path} does not exist at ref '${ref}' (referenced in docs)"
              FAIL=1
            fi
          done < <(grep -ohE 'adnvilla/gha-toolkit/\.github/workflows/[A-Za-z0-9_-]+\.yml@[A-Za-z0-9._/-]+' \
            README.md EXAMPLES.md ENVIRONMENTS.md | sort -u)
          exit $FAIL

  # This job always passes, it's just to have a consolidated status
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [validate-workflows, validate-markdown, validate-chart, validate-doc-pins]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.validate-workflows.result }}" != "success" ]; then
            echo "Workflow validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-chart.result }}" != "success" ]; then
            echo "Helm chart validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-doc-pins.result }}" != "success" ]; then
            echo "Documentation version pin validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-markdown.result }}" != "success" ]; then
            echo "Markdown validation failed (warning only)"
          fi
          echo "CI Complete ✅"
