# CI workflow for gha-toolkit
# This workflow validates workflow syntax and generates automatic releases

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  validate-workflows:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate YAML syntax
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .github/workflows/
          strict: false

  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
          ignore_files: node_modules/

  validate-chart:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint charts/app

      - name: Render chart with sample values
        run: |
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=test \
            --set ingress.enabled=true \
            --set ingress.host=test.local > /dev/null

      - name: Render chart with optional resources enabled
        run: |
          # Catch template errors in SA/HPA/PDB/NetworkPolicy (all default-off).
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=test \
            --set serviceAccount.create=true \
            --set autoscaling.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set networkPolicy.enabled=true > /dev/null

      - name: Render chart in canary mode
        run: |
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=stable \
            --set strategy.mode=canary \
            --set canary.image.repository=registry.example.local:5000/test-app \
            --set canary.image.tag=canary \
            --set canary.replicas=1 \
            --set canary.ingress.enabled=true \
            --set ingress.enabled=true \
            --set ingress.host=api.local > /dev/null
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=stable \
            --set strategy.mode=canary \
            --set canary.trafficProvider=traefik \
            --set canary.weight=10 \
            --set canary.image.repository=registry.example.local:5000/test-app \
            --set canary.image.tag=canary \
            --set ingress.enabled=true \
            --set ingress.host=api.local > /dev/null

      - name: Render chart in blueGreen mode
        run: |
          helm template test-release charts/app \
            --set image.repository=registry.example.local:5000/test-app \
            --set image.tag=blue \
            --set strategy.mode=blueGreen \
            --set blueGreen.activeSlot=blue \
            --set blueGreen.blue.image.repository=registry.example.local:5000/test-app \
            --set blueGreen.blue.image.tag=blue \
            --set blueGreen.blue.replicas=1 \
            --set blueGreen.green.image.repository=registry.example.local:5000/test-app \
            --set blueGreen.green.image.tag=green \
            --set blueGreen.green.replicas=1 > /dev/null

  validate-doc-pins:
    name: Validate Documentation Version Pins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Confirm every workflows/*.yml@ref pin in the docs exists at that ref
        run: |
          set -euo pipefail
          # PR checkouts only materialize the PR branch as a local ref. Branch
          # pins like @master (documented in README) need origin/<branch>, and
          # tags need an explicit fetch — otherwise this job passes on master
          # pushes and fails on every PR that references a branch pin.
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --quiet
          FAIL=0
          while read -r pin; do
            rest="${pin#adnvilla/gha-toolkit/}"
            path="${rest%@*}"
            ref="${rest##*@}"
            # Version/tag pins (e.g. @v1.5.0, @1.5.0) are immutable and public — they
            # MUST resolve at that exact ref, so a consumer copying the example never
            # gets a broken `uses:`. Documenting an unreleased version still fails here.
            #
            # Branch pins (e.g. @master) mean "latest": the file only needs to exist in
            # the code under review (HEAD). After this PR merges, the branch will contain
            # it — so adding a new workflow + its @master docs passes in a single PR
            # instead of the old chicken-and-egg where @master wasn't on origin/master yet.
            if [[ "${ref}" =~ ^v?[0-9] ]]; then
              if git show "${ref}:${path}" > /dev/null 2>&1; then
                echo "OK   ${path}@${ref} (tag)"
              else
                echo "::error::${path} does not exist at tag/version ref '${ref}' (referenced in docs)"
                FAIL=1
              fi
            else
              if git show "HEAD:${path}" > /dev/null 2>&1 \
                || git show "${ref}:${path}" > /dev/null 2>&1 \
                || git show "origin/${ref}:${path}" > /dev/null 2>&1; then
                echo "OK   ${path}@${ref} (branch)"
              else
                echo "::error::${path} does not exist at ref '${ref}' or in HEAD (referenced in docs)"
                FAIL=1
              fi
            fi
          done < <(grep -ohE 'adnvilla/gha-toolkit/\.github/workflows/[A-Za-z0-9_-]+\.yml@[A-Za-z0-9._/-]+' \
            README.md EXAMPLES.md ENVIRONMENTS.md | sort -u)
          exit $FAIL

  # This job always passes, it's just to have a consolidated status
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [validate-workflows, validate-markdown, validate-chart, validate-doc-pins]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.validate-workflows.result }}" != "success" ]; then
            echo "Workflow validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-chart.result }}" != "success" ]; then
            echo "Helm chart validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-doc-pins.result }}" != "success" ]; then
            echo "Documentation version pin validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-markdown.result }}" != "success" ]; then
            echo "Markdown validation failed (warning only)"
          fi
          echo "CI Complete ✅"
