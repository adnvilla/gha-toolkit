# CI workflow para gha-toolkit
# Este workflow valida la sintaxis de los workflows y genera releases automáticas

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  validate-workflows:
    name: Validate Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Validate YAML syntax
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: .github/workflows/
          strict: false

  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Lint Markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json
          ignore_files: node_modules/

  # Este job siempre pasa, es solo para tener un estado consolidado
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [validate-workflows, validate-markdown]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.validate-workflows.result }}" != "success" ]; then
            echo "Workflow validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-markdown.result }}" != "success" ]; then
            echo "Markdown validation failed (warning only)"
          fi
          echo "CI Complete ✅"
