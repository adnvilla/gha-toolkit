{{- $mode := include "app.strategyMode" . -}}
{{- /* Standard Ingress for rolling / canary(none). Skipped when canary uses Traefik CRDs. */ -}}
{{- if and .Values.ingress.enabled (ne $mode "blueGreen") -}}
{{- if not (and (eq $mode "canary") (eq .Values.canary.trafficProvider "traefik")) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "app.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- end }}
