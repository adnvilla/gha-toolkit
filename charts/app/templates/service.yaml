{{- $mode := include "app.strategyMode" . -}}
{{- /* Rolling + canary: stable Service with original selectors.
       blueGreen: Service selects only the active slot. */ -}}
{{- if ne $mode "" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    {{- if eq $mode "blueGreen" }}
    app.kubernetes.io/slot: {{ .Values.blueGreen.activeSlot }}
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- if eq $mode "blueGreen" }}
    {{- include "app.slot.selectorLabels" (dict "root" . "slot" .Values.blueGreen.activeSlot) | nindent 4 }}
    {{- else }}
    {{- include "app.selectorLabels" . | nindent 4 }}
    {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
{{- end }}
