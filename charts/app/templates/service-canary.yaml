{{- if eq (include "app.strategyMode" .) "canary" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.canary.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app.kubernetes.io/track: canary
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "app.canary.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
{{- end }}
