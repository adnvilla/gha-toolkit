# Default values for the generic `app` chart.
# Every value here can be overridden per-project via a values-<env>.yaml file
# living in the consumer repo (e.g. k8s/values-local.yaml) and passed to
# `helm upgrade --install -f`.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Container port the app listens on.
containerPort: 8080

# List of { name, value } pairs injected as container env vars.
env: []
# - name: PORT
#   value: "8080"

# Optional list of envFrom sources (configMapRef/secretRef), passed through as-is.
envFrom: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

# Raw pass-through blocks: set exactly what you'd put under a Pod spec.
affinity: {}
tolerations: []
nodeSelector: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  # className: traefik
  annotations: {}
  host: ""
  path: /
  pathType: Prefix

# Deployment strategy. Default `rolling` preserves the single-Deployment behaviour
# used by k8s-deploy.yml. Set to `canary` (APIs) or `blueGreen` (e.g. Kafka workers)
# when using k8s-canary.yml / k8s-bluegreen.yml.
strategy:
  mode: rolling # rolling | canary | blueGreen

# Canary settings (only used when strategy.mode=canary). The stable Deployment keeps
# the rolling resource names/selectors; the canary Deployment/Service use a distinct
# instance label so they never join the stable Service endpoints.
canary:
  # Image for the canary Deployment. Workflows set these via --set on deploy.
  image:
    repository: ""
    tag: ""
  replicas: 1
  # % of traffic sent to canary when trafficProvider=traefik (0–100). Ignored for
  # trafficProvider=none (canary is only reachable via canary.ingress).
  weight: 10
  # none: main Ingress → stable; optional canary.ingress for smoke tests.
  # traefik: render TraefikService + IngressRoute with weighted backends (requires
  # Traefik CRDs in the cluster). Standard Ingress is skipped in that case.
  trafficProvider: none # none | traefik
  ingress:
    enabled: false
    # Defaults to "canary.<ingress.host>" when empty and ingress.host is set.
    host: ""
    path: /
    pathType: Prefix
    annotations: {}
  # Traefik IngressRoute entryPoints when trafficProvider=traefik.
  traefik:
    entryPoints:
      - web

# Blue/green settings (only used when strategy.mode=blueGreen). Two Deployments
# (…-blue / …-green); the Service selects pods for blueGreen.activeSlot only.
# Ideal for Kafka workers: same consumer group, promote flips the active slot.
blueGreen:
  activeSlot: blue # blue | green
  # Seconds both slots may run during promote (Kafka rebalance overlap). Prefer 0.
  overlapSeconds: 0
  blue:
    replicas: 1
    image:
      repository: ""
      tag: ""
  green:
    replicas: 0
    image:
      repository: ""
      tag: ""

# Opt-in resources (default off — existing consumers see no change).
serviceAccount:
  # Create a ServiceAccount and mount it on the Deployment pods.
  create: false
  # Optional explicit name; defaults to the chart fullname when create is true.
  name: ""
  annotations: {}
  automountServiceAccountToken: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  # Set exactly one of minAvailable / maxUnavailable (minAvailable wins if both set).
  minAvailable: 1
  # maxUnavailable: 1

networkPolicy:
  enabled: false
  # When true, allow ingress from any pod in the same namespace to the Service port.
  allowSameNamespace: true
  # Extra ingress rules, passed through as-is under spec.ingress.
  extraIngress: []
  # Egress: empty = allow all (no egress rules rendered). Set to restrict.
  # Use [{ }] for "allow all egress" explicitly, or concrete rules.
  egress: []
